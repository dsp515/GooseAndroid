# Project-wide Gradle settings.

# AndroidX — required for Compose and all modern Android libraries
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Enables namespacing of each library's R class so that its R class includes
# only the resources declared in the library itself and none from the library's dependencies
android.nonTransitiveRClass=true

# Increase JVM heap for large Kotlin/Compose projects
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Enable parallel builds
org.gradle.parallel=true
org.gradle.caching=true
